openapi: 3.0.0
info:
  title: Sistema de Catraca API
  [cite_start]description: API para gerenciamento de alunos e controle de acesso via catraca com registro de logs. [cite: 1]
  version: 1.0.0

servers:
  - url: /
    [cite_start]description: Servidor de Desenvolvimento [cite: 1]

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      [cite_start]bearerFormat: JWT [cite: 1]

paths:
  /login:
    post:
      summary: Realiza login do administrador
      tags: [Autenticação]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [usuario, senha]
              properties:
                usuario: {type: string}
                senha: {type: string}
      responses:
        '200':
          [cite_start]description: Login realizado com sucesso [cite: 1]
        '401':
          [cite_start]description: Usuário ou senha inválidos [cite: 1]

  /alunos:
    get:
      summary: Lista todos os alunos
      tags: [Alunos]
      responses:
        '200':
          [cite_start]description: Lista de objetos de alunos [cite: 1]
    post:
      summary: Cadastra um novo aluno
      tags: [Alunos]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [nome, cpf, status]
              properties:
                nome: {type: string}
                cpf: {type: string}
                status: {type: string, enum: [ativo, bloqueado]}
      responses:
        '201':
          [cite_start]description: Aluno cadastrado com sucesso [cite: 1]
        '400':
          [cite_start]description: CPF inválido, já cadastrado ou status inválido [cite: 1]

  /alunos/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: {type: integer}
    get:
      summary: Busca aluno por ID
      tags: [Alunos]
      security:
        - bearerAuth: []
      responses:
        '200':
          [cite_start]description: Dados do aluno [cite: 1]
        '404':
          [cite_start]description: Aluno não encontrado [cite: 1]
    put:
      summary: Atualiza dados do aluno
      tags: [Alunos]
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                nome: {type: string}
                cpf: {type: string}
                status: {type: string, enum: [ativo, bloqueado]}
      responses:
        '200':
          [cite_start]description: Aluno atualizado com sucesso [cite: 1]
    delete:
      summary: Remove um aluno
      tags: [Alunos]
      security:
        - bearerAuth: []
      responses:
        '200':
          [cite_start]description: Aluno deletado com sucesso [cite: 1]

  /alunos/cpf/{cpf}:
    get:
      summary: Busca aluno por CPF
      tags: [Alunos]
      parameters:
        - name: cpf
          in: path
          required: true
          schema: {type: string}
      responses:
        '200':
          [cite_start]description: Dados do aluno encontrados por CPF [cite: 1]
        '404':
          [cite_start]description: Aluno não encontrado [cite: 1]

  /catraca:
    post:
      summary: Valida acesso do aluno (Sem Token)
      [cite_start]description: Recebe o CPF via JSON, valida o status do aluno e registra um log de acesso. [cite: 1]
      tags: [Catraca]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [cpf]
              properties:
                cpf:
                  type: string
                  example: "12345678901"
      responses:
        '200':
          [cite_start]description: Acesso LIBERADO [cite: 1]
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: {type: string, example: "LIBERADO"}
        '403':
          [cite_start]description: Acesso BLOQUEADO (aluno inativo ou bloqueado) [cite: 1]
        '400':
          [cite_start]description: CPF inválido ou dados mal formatados [cite: 1]
        '404':
          [cite_start]description: Aluno não encontrado [cite: 1]