openapi: 3.0.0
info:
  title: Sistema de Catraca API
  description: API para gerenciamento de alunos e controle de acesso via catraca.
  version: 1.0.0

servers:
  - url: /
    description: Servidor de Desenvolvimento

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

paths:
  /login:
    post:
      summary: Realiza login do administrador
      tags: [Autenticação]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [usuario, senha]
              properties:
                usuario: {type: string}
                senha: {type: string}
      responses:
        '200':
          description: Login realizado com sucesso
        '401':
          description: Usuário ou senha inválidos

  /alunos:
    get:
      summary: Lista todos os alunos
      tags: [Alunos]
      responses:
        '200':
          description: Lista de objetos de alunos
    post:
      summary: Cadastra um novo aluno
      tags: [Alunos]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [nome, cpf, status]
              properties:
                nome: {type: string}
                cpf: {type: string}
                status: {type: string, enum: [ativo, bloqueado]}
      responses:
        '201':
          description: Aluno cadastrado com sucesso
        '400':
          description: CPF inválido, já cadastrado ou status inválido

  /alunos/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: {type: integer}
    get:
      summary: Busca aluno por ID
      tags: [Alunos]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Dados do aluno
        '404':
          description: Aluno não encontrado
    put:
      summary: Atualiza dados do aluno
      tags: [Alunos]
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                nome: {type: string}
                cpf: {type: string}
                status: {type: string, enum: [ativo, bloqueado]}
      responses:
        '200':
          description: Aluno atualizado com sucesso
    delete:
      summary: Remove um aluno
      tags: [Alunos]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Aluno deletado com sucesso

  /alunos/cpf/{cpf}:
    get:
      summary: Busca aluno por CPF
      tags: [Alunos]
      parameters:
        - name: cpf
          in: path
          required: true
          schema: {type: string}
      responses:
        '200':
          description: Dados do aluno encontrados por CPF
        '404':
          description: Aluno não encontrado

  /catraca:
    post:
      summary: Valida acesso do aluno (Sem Token)
      tags: [Catraca]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: