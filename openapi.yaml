openapi: 3.0.0
info:
  title: API Sistema de Catraca
  description: API para gerenciamento de alunos e controle de acesso via catraca com integração Firebase.
  version: 1.0.0

servers:
  - url: http://localhost:5000
    description: Servidor Local

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Aluno:
      type: object
      properties:
        id:
          type: integer
          example: 1
        nome:
          type: string
          example: "João Silva"
        cpf:
          type: string
          example: "12345678901"
        status:
          type: string
          enum: [ativo, bloqueado]
          example: "ativo"

paths:
  /:
    get:
      summary: Verifica o status da API
      responses:
        "200":
          description: API online
          content:
            application/json:
              example: { "api": "Sistema de Catraca" }

  /login:
    post:
      summary: Realiza login administrativo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [usuario, senha]
              properties:
                usuario:
                  type: string
                senha:
                  type: string
      responses:
        "200":
          description: Login bem-sucedido
        "401":
          description: Usuário ou senha inválidos

  /alunos:
    get:
      summary: Lista todos os alunos
      responses:
        "200":
          description: Lista de alunos cadastrados
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Aluno"
    post:
      summary: Cadastra um novo aluno
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [nome, cpf, status]
              properties:
                nome:
                  type: string
                cpf:
                  type: string
                status:
                  type: string
                  enum: [ativo, bloqueado]
      responses:
        "201":
          description: Aluno cadastrado
        "400":
          description: Dados inválidos ou CPF já cadastrado

  /alunos/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
    get:
      summary: Busca aluno por ID
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Dados do aluno
        "404":
          description: Aluno não encontrado
    put:
      summary: Atualiza todos os dados do aluno
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Aluno"
      responses:
        "200":
          description: Aluno atualizado
    patch:
      summary: Atualiza parcialmente um aluno
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                nome: { type: string }
                cpf: { type: string }
                status: { type: string, enum: [ativo, bloqueado] }
      responses:
        "200":
          description: Campos atualizados com sucesso
    delete:
      summary: Remove um aluno
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Aluno deletado

  /alunos/cpf/{cpf}:
    get:
      summary: Busca aluno pelo número do CPF
      parameters:
        - name: cpf
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Dados do aluno
        "404":
          description: Aluno não encontrado

  /catraca:
    post:
      summary: Valida acesso do aluno e gera log
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [cpf]
              properties:
                cpf:
                  type: string
      responses:
        "200":
          description: Acesso LIBERADO
        "403":
          description: Acesso BLOQUEADO
        "404":
          description: Aluno não encontrado
